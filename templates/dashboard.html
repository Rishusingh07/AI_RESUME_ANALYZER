{% extends "base.html" %}
{% block content %}
<div class="row">
  <div class="col-md-7">
    <div class="card shadow-sm border-0 mb-4">
      <div class="card-body">
        <h4 class="card-title mb-3">Analyze Resume</h4>
        <form method="post" enctype="multipart/form-data">
          <div class="mb-3">
            <label class="form-label">Resume (PDF)</label>
            <input type="file" name="resume" accept=".pdf" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Job Description</label>
            <textarea name="job_description" rows="8" class="form-control" required></textarea>
          </div>
          <button class="btn btn-primary">Analyze</button>
        </form>
      </div>
    </div>
  </div>
  <div class="col-md-5">
    <div class="card shadow-sm border-0">
      <div class="card-body">
        <h5 class="card-title">History</h5>
        <ul class="list-group list-group-flush">
          {% for item in history %}
            <li class="list-group-item d-flex justify-content-between">
              <span>{{ item.filename }}</span>
              <span class="badge bg-info">{{ item.match_score }}%</span>
            </li>
          {% else %}
            <li class="list-group-item text-muted">No analyses yet.</li>
          {% endfor %}
        </ul>
      </div>
    </div>
  </div>
</div>
{% endblock %}
